name: Deploy on Firebase

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Angular app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm install -g @angular/cli
          ng build --configuration=production --stats-json --verbose

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Firebase Deploy
        run: |
          set +e
          OUTPUT=$(firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive 2>&1)
          CODE=$?
          echo "$OUTPUT"
          if [ $CODE -ne 0 ] && echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "El release ya se aplicó (error de confirmación duplicada por red inestable). Continuando."
            exit 0
          fi
          exit $CODE

      - name: Delete build artifact
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: dist

  verify:
    name: Verify deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check site is up
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://contenidoderepaso.web.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "El sitio no respondió 200, devolvió $STATUS"
            exit 1
          fi
          echo "Sitio verificado correctamente."